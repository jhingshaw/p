    // 🔥🔥🔥 FUNGSI TRIANGULASI BTS (SIMULASI REAL SS7 ATTACK) 🔥🔥🔥
    function triangulateLocation(phoneNumber, operator, city) {
      const towers = TOWER_DB[city] || TOWER_DB['Jakarta'];
      const operatorTowers = towers.filter(t => t.operator === operator.name.split(' ')[0]);
      
      if (operatorTowers.length === 0) return null;
      
      // Pilih 3 tower terdekat (simulasi signal strength)
      const selectedTowers = operatorTowers.slice(0, 3);
      
      // Hitung centroid (triangulasi)
      const avgLat = selectedTowers.reduce((sum, t) => sum + t.lat, 0) / selectedTowers.length;
      const avgLng = selectedTowers.reduce((sum, t) => sum + t.lng, 0) / selectedTowers.length;
      
      // Tambah random offset untuk akurasi (50-500 meter)
      const accuracy = 50 + Math.random() * 450;
      const latOffset = (Math.random() - 0.5) * (accuracy / 111000);
      const lngOffset = (Math.random() - 0.5) * (accuracy / 111000);
      
      return {
        lat: avgLat + latOffset,
        lng: avgLng + lngOffset,
        accuracy: Math.round(accuracy),
        towers: selectedTowers,
        signalStrength: {
          tower1: -70 - Math.random() * 30,
          tower2: -75 - Math.random() * 30,
          tower3: -80 - Math.random() * 30
        },
        method: 'SS7 Signal Triangulation (Simulated)'
      };
    }

    // 🔥🔥🔥 FUNGSI HLR LOOKUP SIMULATION 🔥🔥🔥
    function hlrLookup(phoneNumber, operator) {
      const cities = Object.keys(TOWER_DB);
      const city = cities[Math.floor(Math.random() * cities.length)];
      
      return {
        msisdn: phoneNumber,
        mcc: '510',
        mnc: operator.mnc,
        msin: phoneNumber.substring(3),
        imsi: `510${operator.mnc}${phoneNumber.substring(3)}`,
        status: 'CONNECTED',
        lastLocationUpdate: new Date(Date.now() - Math.random() * 3600000).toISOString(),
        servingMSC: `${city} MSC ${Math.floor(Math.random() * 10) + 1}`,
        vlrAddress: `${city} VLR ${Math.floor(Math.random() * 5) + 1}`,
        roaming: Math.random() > 0.7,
        networkType: ['4G LTE', '5G NR', '3G UMTS'][Math.floor(Math.random() * 3)],
        cellID: Math.floor(Math.random() * 1000) + 100,
        lac: Math.floor(Math.random() * 100) + 1
      };
    }

    // 🔥🔥🔥 FUNGSI UTAMA PELACAKAN 🔥🔥🔥
    function extremeRealTrack(phoneNumber) {
      const clean = phoneNumber.replace(/[^0-9]/g, '');
      const prefix4 = clean.substring(0, 4);
      const prefix3 = clean.substring(0, 3);
      
      const operator = OPERATOR_DB[prefix4] || OPERATOR_DB[prefix3] || { name: 'Unknown', mnc: '00' };
      
      // Tentukan kota berdasarkan distribusi operator
      const cities = Object.keys(TOWER_DB);
      let city;
      if (operator.name.includes('Telkomsel')) {
        city = cities[Math.floor(Math.random() * cities.length)];
      } else if (operator.name.includes('Indosat')) {
        city = ['Jakarta', 'Surabaya', 'Medan'][Math.floor(Math.random() * 3)];
      } else if (operator.name.includes('XL')) {
        city = ['Jakarta', 'Bandung', 'Denpasar'][Math.floor(Math.random() * 3)];
      } else {
        city = cities[Math.floor(Math.random() * cities.length)];
      }
      
      const hlrData = hlrLookup(clean, operator);
      const location = triangulateLocation(clean, operator, city);
      
      return {
        phone: clean,
        operator: operator.name,
        timestamp: new Date().toISOString(),
        hlr: hlrData,
        location: location,
        city: city,
        mapsLink: location ? 
          `https://www.openstreetmap.org/?mlat=${location.lat}&mlon=${location.lng}` : null,
        googleMaps: location ?
          `https://www.google.com/maps?q=${location.lat},${location.lng}` : null,
        ss7Command: {
          sendRoutingInfo: `SRI SM-RP-DA ${clean} IMSI:${hlrData.imsi}`,
          provideLocation: `PLR MSISDN:${clean} LCS-Client:Emergency`,
          status: 'EXECUTED_SUCCESSFULLY'
        }
      };
    }

    // 🔥🔥🔥 FUNGSI TRUECALLER SCRAPE 🔥🔥🔥
    async function truecallerLookup(phone) {
      try {
        const response = await fetch(`https://www.truecaller.com/search/id/${phone}`, {
          headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
        });
        const html = await response.text();
        
        // Extract data using regex
        const nameMatch = html.match(/<h1[^>]*>([^<]+)<\/h1>/);
        const locationMatch = html.match(/<span[^>]*>Lives in ([^<]+)<\/span>/);
        const carrierMatch = html.match(/<span[^>]*>([^<]+)<\/span><span[^>]*>Carrier/);
        
        return {
          name: nameMatch ? nameMatch[1].trim() : 'Not Found',
          location: locationMatch ? locationMatch[1].trim() : 'Unknown',
          carrier: carrierMatch ? carrierMatch[1].trim() : 'Unknown',
          profileUrl: `https://www.truecaller.com/search/id/${phone}`
        };
      } catch (error) {
        return { error: 'Truecaller lookup failed', profileUrl: `https://www.truecaller.com/search/id/${phone}` };
      }
    }

            // SS7 Commands
